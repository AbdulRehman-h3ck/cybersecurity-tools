name: Build Windows Executable

on:
  workflow_dispatch: # Is se Actions tab mein button nazar ayega

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install androguard pyinstaller

    - name: Build with PyInstaller
      run: |
        # Folder ke andar jana zaroori hai
        cd android-threat-intel
        
        # Final Build Command
        # --noconsole: Background terminal nahi khulega
        # --onefile: Sab kuch aik hi exe mein pack hoga
        # --collect-all: Androguard ki saari internal files (public.xml) shamil hongi
        pyinstaller --noconsole --onefile --collect-all androguard --name "APK_Forensic_Lab" gui_tool.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-App-Build
        path: android-threat-intel/dist/APK_Forensic_Lab.exe
