name: Stable Build EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Stable Dependencies
      run: |
        python -m pip install --upgrade pip
        # 3.3.5 is available on PyPI and works with our code
        pip install androguard==3.3.5 pyinstaller

    - name: Build EXE
      run: |
        cd android-threat-intel
        pyinstaller --noconsole --onefile --collect-all androguard --name "APK_Forensic_Lab" gui_tool.py

    - name: Save EXE
      uses: actions/upload-artifact@v4
      with:
        name: Stable-App
        path: android-threat-intel/dist/APK_Forensic_Lab.exe
