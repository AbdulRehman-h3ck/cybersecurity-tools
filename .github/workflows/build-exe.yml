name: Build Windows Executable

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Version 3.4.0 specify karne se 'ModuleNotFoundError' khatam ho jayega
        pip install androguard==3.4.0 pyinstaller

    - name: Build with PyInstaller
      run: |
        cd android-threat-intel
        pyinstaller --noconsole --onefile --collect-all androguard --name "APK_Forensic_Lab" gui_tool.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-App-Build
        path: android-threat-intel/dist/APK_Forensic_Lab.exe
