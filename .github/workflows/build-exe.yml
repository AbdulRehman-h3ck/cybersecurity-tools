name: Build Windows Executable

on:
  workflow_dispatch: # Manual button ke liye

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # "androguard[full]" naye version ke modules (androguard.apk) ke liye zaroori hai
        pip install "androguard[full]" pyinstaller

    - name: Build with PyInstaller
      run: |
        # Folder ka naam ensure karein
        cd android-threat-intel
        
        # PyInstaller command
        # --collect-all androguard zaroori hai taake naye version ki files bundle ho jayein
        pyinstaller --noconsole --onefile --collect-all androguard --name "APK_Forensic_Lab" gui_tool.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-App-Build
        path: android-threat-intel/dist/APK_Forensic_Lab.exe
