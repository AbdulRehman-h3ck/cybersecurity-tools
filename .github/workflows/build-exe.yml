name: Build Windows Executable

on:
  workflow_dispatch: # Is se aap jab chahe button daba kar EXE bana sakte hain

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install androguard pyinstaller

    - name: Build with PyInstaller
      run: |
        # Hum specify kar rahe hain ke android-threat-intel folder ke andar jao
        cd android-threat-intel
        pyinstaller --noconsole --onefile --name "APK_Forensic_Lab" gui_tool.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-App-Build
        path: android-threat-intel/dist/APK_Forensic_Lab.exe
